# pre-commit 仅检查本次暂存文件，避免全库历史 lint 阻断日常提交
pre-commit:
  parallel: true
  commands:
    oxfmt:
      glob: '*.{js,ts,jsx,tsx,vue,json,md,yaml,yml,mjs,cjs}'
      run: pnpm exec oxfmt --check {staged_files}
    oxlint:
      glob: '*.{js,ts,jsx,tsx,vue}'
      run: pnpm exec oxlint {staged_files}
    eslint:
      glob: '*.{js,ts,jsx,tsx,vue}'
      run: pnpm exec eslint --cache {staged_files}
    stylelint:
      glob: '*.{vue,css,less,scss}'
      run: pnpm exec stylelint --cache {staged_files}
    checkType:
      glob: '*.{ts,tsx,vue}'
      run: pnpm check:type

post-merge:
  commands:
    install:
      run: pnpm install

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit $1
